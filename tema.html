<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">tema — vida do livro db</title>
  <style>
    @font-face {
      font-family: 'Editorial New';
      src: url('fonts/PPEditorialNew-Regular.otf') format('opentype');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Editorial New';
      src: url('fonts/PPEditorialNew-Italic.otf') format('opentype');
      font-weight: 400; font-style: italic; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Haas Grotesk';
      src: url('fonts/Haas Grot Text R 55 Roman.ttf') format('truetype');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Haas Grotesk';
      src: url('fonts/Haas Grot Text R 56 Italic.ttf') format('truetype');
      font-weight: 400; font-style: italic; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Haas Grotesk';
      src: url('fonts/Haas Grot Text R 65 Medium.ttf') format('truetype');
      font-weight: 500; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Haas Grotesk';
      src: url('fonts/Haas Grot Text R 75 Bold.ttf') format('truetype');
      font-weight: 700; font-style: normal; font-display: swap;
    }

    :root {
      --bg: #fafaf8;
      --ink: #111;
      --mid: #1a1a1a;
      --light: #1a1a1a;
      --border: #ddd;
      --tan: #f0efe8;
      --mono: "Courier New", Courier, monospace;
      --sans: "Neue Haas Grotesk", -apple-system, system-ui, sans-serif;
      --serif: "Editorial New", Georgia, serif;
      --max: 1040px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.6;
    }
    a { color: var(--ink); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    .header-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 13px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .h-back  { font-size: 13px; color: var(--mid); }
    .h-back:hover { color: var(--ink); text-decoration: underline; }
    .h-title { font-size: 13px; font-weight: bold; letter-spacing: 0.14em; text-transform: uppercase; }
    .h-num   { font-size: 13px; color: var(--mid); }

    /* ── MAIN ── */
    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 40px 80px;
      padding-top: calc(43px + 36px);
    }

    /* ── INTRO ── */
    .intro-block {
      padding: 28px 0 22px;
      border-bottom: 1px solid var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 40px;
    }
    .intro-text {
      font-size: 14px;
      color: var(--mid);
      line-height: 1.75;
      max-width: 540px;
    }
    .intro-dirs {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .dirs-label {
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--light);
    }
    .dir-pill {
      display: inline-block;
      font-size: 12px;
      border: 1px solid var(--border);
      padding: 3px 10px;
      color: var(--mid);
      letter-spacing: 0.04em;
    }
    .dir-pill:hover { border-color: var(--ink); color: var(--ink); text-decoration: none; }

    /* ── COLUMNS ── */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1.25fr 1fr 1fr 1fr;
      gap: 0 26px;
      align-items: start;
      padding-top: 0;
    }

    .col { padding-top: 24px; }

    .col-head {
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--light);
      border-bottom: 1px solid var(--ink);
      padding-bottom: 9px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .col-count {
      letter-spacing: 0;
      font-size: 13px;
      color: var(--mid);
    }
    .col-body { position: relative; }
    .col-body.capped { overflow: hidden; }
    .col-body.capped::after {
      content: '';
      position: absolute; left: 0; right: 0; bottom: 0; height: 54px;
      background: linear-gradient(transparent, var(--bg));
      pointer-events: none;
    }
    .ver-tudo-wrap { text-align: center; margin-top: 24px; }
    .ver-tudo {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--ink);
      color: var(--ink);
      padding: 7px 22px;
      cursor: pointer;
    }
    .ver-tudo:hover { background: var(--ink); color: var(--bg); }

    /* ── VÍDEOS ── */
    .v-item {
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .v-item:last-child { border-bottom: none; }
    .v-thumb {
      display: block;
      position: relative;
      aspect-ratio: 16 / 9;
      background: var(--ink);
      background-size: cover;
      background-position: center;
      margin-bottom: 10px;
      text-decoration: none;
    }
    .v-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.15);
    }
    .v-thumb:hover .v-play { background: rgba(0,0,0,0.35); color: rgba(255,255,255,0.9); }
    .v-title {
      font-size: 13px;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .v-meta { font-size: 12px; color: var(--mid); }

    /* ── TEXTOS ── */
    .t-item {
      margin-bottom: 22px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }
    .t-item:last-child { border-bottom: none; }
    .t-tag {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 5px;
    }
    .t-title {
      font-size: 13px;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 7px;
    }
    .t-trecho {
      font-size: 13px;
      font-style: italic;
      color: var(--mid);
      line-height: 1.65;
      margin-bottom: 6px;
    }
    .t-autor { font-size: 12px; color: var(--mid); margin-bottom: 6px; }
    .t-fonte { font-size: 12px; color: var(--light); }

    /* ── LINKS ── */
    .l-item {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .l-item:last-child { border-bottom: none; }
    .l-title {
      font-size: 13px;
      color: var(--ink);
      line-height: 1.4;
    }
    .l-title:hover { text-decoration: underline; }
    .l-domain { font-size: 11px; color: var(--light); }
    .l-type {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--border);
    }

    /* ── PODCASTS ── */
    .p-item {
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .p-item:last-child { border-bottom: none; }
    .p-show {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 4px;
    }
    .p-title {
      font-size: 13px;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .p-meta { font-size: 12px; color: var(--mid); }

    /* ── ARTIGOS ── */
    .a-item {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .a-item:last-child { border-bottom: none; }
    .a-title { font-size: 13px; font-weight: bold; line-height: 1.4; margin-bottom: 3px; }
    .a-autores { font-size: 12px; color: var(--mid); margin-bottom: 2px; }
    .a-meta { font-size: 12px; color: var(--light); display: flex; align-items: center; gap: 6px; }
    .a-pdf {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      border: 1px solid var(--border); padding: 1px 4px; color: var(--mid);
    }

    /* ── LEITURAS ── */
    .leituras {
      margin-top: 40px;
      padding-top: 0;
      border-top: 1px solid var(--ink);
    }
    .leituras-head {
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--light);
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .leituras-head a {
      font-size: 13px;
      color: var(--light);
      letter-spacing: 0.1em;
    }
    .leituras-head a:hover { color: var(--ink); text-decoration: underline; }
    .livro-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: baseline;
      gap: 0 20px;
      padding: 8px 6px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--ink);
    }
    .livro-row:hover { background: var(--ink); color: var(--bg); }
    .livro-row:hover .livro-autor { color: #aaa; }
    .livro-row:hover .livro-arrow { opacity: 1; color: var(--bg); }
    .livro-titulo {
      font-size: 13px;
      font-weight: bold;
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }
    .livro-autor {
      font-weight: normal;
      font-size: 13px;
      color: var(--mid);
      white-space: nowrap;
    }
    .livro-meta {
      font-size: 12px;
      color: var(--light);
      white-space: nowrap;
    }
    .livro-arrow {
      font-size: 12px;
      opacity: 0;
      color: var(--mid);
    }

    /* ── NOT FOUND ── */
    .not-found {
      padding: 80px 0 40px;
      font-size: 14px;
      color: var(--mid);
    }

    /* ── FOOTER ── */
    footer {
      max-width: var(--max);
      margin: 0 auto;
      padding: 14px 40px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--light);
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
    }

    /* ── LIVROS GRID (capas) ── */
    .livros-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 20px 14px;
      padding: 16px 0 40px;
    }
    .livro-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: var(--ink);
    }
    .livro-capa {
      aspect-ratio: 2 / 3;
      background-color: var(--ink);
      background-size: cover;
      background-position: center;
      margin-bottom: 9px;
      display: flex;
      align-items: flex-end;
      padding: 8px;
    }
    .livro-capa-fallback {
      font-family: var(--serif);
      font-style: italic;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      line-height: 1.35;
    }
    .livro-card-titulo {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 3px;
    }
    .livro-card-autor {
      font-size: 13px;
      color: var(--mid);
    }
    .livro-card:hover .livro-card-titulo { text-decoration: underline; text-underline-offset: 2px; }

    @media (max-width: 800px) {
      .columns { grid-template-columns: 1fr 1fr; }
      .intro-block { flex-direction: column; align-items: flex-start; gap: 16px; }
      .intro-dirs { align-items: flex-start; }
    }
    @media (max-width: 640px) {
      .header-inner { padding: 10px 16px; }
      main { padding-left: 16px; padding-right: 16px; padding-top: calc(38px + 24px); }
      footer { padding: 12px 16px; }
      .h-num { display: none; }
      .livro-row { grid-template-columns: 1fr auto; }
      .livro-meta { display: none; }
    }
    @media (max-width: 500px) {
      .columns { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="h-back" href="index.html">← início</a>
    <div class="h-title" id="h-title"></div>
    <div class="h-num" id="h-num"></div>
  </div>
</header>

<main id="main-content">
</main>

<footer>
  <span>vida do livro db</span>
  <span>2025</span>
</footer>

<script src="dados/livros.js"></script>
<script src="dados/temas.js"></script>
<script src="dados/temas-media.js"></script>
<script src="dados/temas-conteudo.js"></script>
<script>
(function () {
  var slug = new URLSearchParams(window.location.search).get('slug') || '';
  var TEMAS = window.TEMAS || {};
  var t = TEMAS[slug];
  var tc = (window.TEMAS_CONTEUDO || {})[slug] || {};
  var total = Object.keys(TEMAS).length;

  if (!t) {
    document.getElementById('h-title').textContent = 'tema não encontrado';
    document.getElementById('main-content').innerHTML =
      '<p class="not-found">← <a href="index.html">voltar ao início</a></p>';
    return;
  }

  /* Page title + header */
  document.getElementById('page-title').textContent = t.titulo + ' — vida do livro db';
  document.getElementById('h-title').textContent = t.titulo;
  document.getElementById('h-num').textContent = t.num + ' / ' + (total < 10 ? '0' + total : total);

  /* Helpers */
  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* Intro */
  var dirsHtml = '';
  if (t.diretorios && t.diretorios.length) {
    var pills = t.diretorios.map(function(d) {
      return '<a href="' + esc(d.href) + '" class="dir-pill">' + esc(d.nome) + ' →</a>';
    }).join('');
    dirsHtml = '<div class="intro-dirs"><span class="dirs-label">diretórios</span>' + pills + '</div>';
  }
  var introHtml = '<div class="intro-block">' +
    '<p class="intro-text">' + esc(t.intro) + '</p>' +
    dirsHtml +
    '</div>';

  /* Vídeos column */
  function ytThumb(href) {
    if (!href || href === '#') return '';
    var m = href.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    return m ? 'https://img.youtube.com/vi/' + m[1] + '/hqdefault.jpg' : '';
  }

  var media = window.TEMAS_MEDIA || {};
  var videos = tc.videos || [];
  var videosHtml = videos.map(function(v) {
    var thumb = ytThumb(v.href);
    var bgStyle = thumb ? ' style="background-image:url(\'' + thumb + '\')"' : '';
    return '<div class="v-item">' +
      '<a href="' + esc(v.href) + '" class="v-thumb" target="_blank" rel="noopener"' + bgStyle + '><span class="v-play">▶</span></a>' +
      '<div class="v-title"><a href="' + esc(v.href) + '" target="_blank" rel="noopener">' + esc(v.titulo) + '</a></div>' +
      '<div class="v-meta">' + esc(v.canal) + ' · ' + esc(v.meta) + '</div>' +
      '</div>';
  }).join('');
  var colVideos = '<div class="col">' +
    '<div class="col-head"><span>vídeos</span><span class="col-count">' + videos.length + '</span></div>' +
    '<div class="col-body">' + videosHtml + '</div></div>';

  /* Textos column */
  var textos = tc.textos || [];
  var textosHtml = textos.map(function(tx) {
    return '<div class="t-item">' +
      '<div class="t-tag">' + esc(tx.tag) + '</div>' +
      '<div class="t-title"><a href="' + esc(tx.href) + '" target="_blank" rel="noopener">' + esc(tx.titulo) + '</a></div>' +
      (tx.autor ? '<div class="t-autor">' + esc(tx.autor) + '</div>' : '') +
      '<p class="t-trecho">' + esc(tx.trecho) + '</p>' +
      '<div class="t-fonte">' + esc(tx.fonte) + '</div>' +
      '</div>';
  }).join('');
  var colTextos = '<div class="col">' +
    '<div class="col-head"><span>textos</span><span class="col-count">' + textos.length + '</span></div>' +
    '<div class="col-body">' + textosHtml + '</div></div>';

  /* Links column */
  var links = tc.links || [];
  var linksHtml = links.map(function(lk) {
    var typeHtml = lk.tipo ? '<div class="l-type">' + esc(lk.tipo) + '</div>' : '';
    return '<div class="l-item">' +
      typeHtml +
      '<a href="' + esc(lk.href) + '" class="l-title" target="_blank" rel="noopener">' + esc(lk.titulo) + '</a>' +
      '<span class="l-domain">' + esc(lk.domain) + '</span>' +
      '</div>';
  }).join('');
  var colLinks = '<div class="col">' +
    '<div class="col-head"><span>links</span><span class="col-count">' + links.length + '</span></div>' +
    '<div class="col-body">' + linksHtml + '</div></div>';

  /* Podcasts column */
  var pods = tc.podcasts || [];
  var podsHtml = pods.map(function(p) {
    if (p.titulo) {
      /* episódio: nome do podcast em cima, título do episódio linkado */
      return '<div class="p-item">' +
        '<div class="p-show">' + esc(p.show) + '</div>' +
        '<div class="p-title"><a href="' + esc(p.href) + '" target="_blank" rel="noopener">' + esc(p.titulo) + '</a></div>' +
        '<div class="p-meta">' + esc(p.meta) + '</div>' +
        '</div>';
    }
    /* podcast inteiro: o próprio nome do podcast é o link */
    return '<div class="p-item">' +
      '<div class="p-title"><a href="' + esc(p.href) + '" target="_blank" rel="noopener">' + esc(p.show) + '</a></div>' +
      '<div class="p-meta">' + esc(p.meta) + '</div>' +
      '</div>';
  }).join('');
  var colPods = '<div class="col">' +
    '<div class="col-head"><span>podcasts</span><span class="col-count">' + pods.length + '</span></div>' +
    '<div class="col-body">' + podsHtml + '</div></div>';

  /* Artigos column */
  var artigos = tc.artigos || [];
  var artigosHtml = artigos.map(function(a) {
    var isPdf = a.href && (a.href.endsWith('.pdf') || a.href.includes('doi.org') || a.href.startsWith('10.'));
    var pdfBadge = isPdf ? '<span class="a-pdf">PDF</span>' : '';
    return '<div class="a-item">' +
      '<div class="a-title"><a href="' + esc(a.href) + '" target="_blank" rel="noopener">' + esc(a.titulo) + '</a></div>' +
      '<div class="a-autores">' + esc(a.autores) + '</div>' +
      '<div class="a-meta"><span>' + esc(a.publicacao) + (a.ano ? ' · ' + esc(a.ano) : '') + '</span>' + pdfBadge + '</div>' +
      '</div>';
  }).join('');
  var colArtigos = artigos.length ? '<div class="col">' +
    '<div class="col-head"><span>artigos</span><span class="col-count">' + artigos.length + '</span></div>' +
    '<div class="col-body">' + artigosHtml + '</div></div>' : '';

  /* Leituras */
  var livros = (window.LIVROS || []).filter(function(l) {
    return l.temas && l.temas.indexOf(slug) !== -1;
  }).sort(function(a, b) {
    return (a.autor||'').localeCompare(b.autor||'', 'pt');
  });
  var livrosHtml = livros.length
    ? '<div class="livros-grid">' + livros.map(function(l) {
        var capaStyle = l.capa ? 'background-image:url(\'' + esc(l.capa) + '\')' : '';
        var fallback  = !l.capa ? '<span class="livro-capa-fallback">' + esc(l.titulo) + '</span>' : '';
        return '<a href="' + esc(l.href) + '" class="livro-card">' +
          '<div class="livro-capa" style="' + capaStyle + '">' + fallback + '</div>' +
          '<span class="livro-card-titulo">' + esc(l.titulo) + '</span>' +
          '<span class="livro-card-autor">' + esc(l.autor) + '</span>' +
        '</a>';
      }).join('') + '</div>'
    : '<p style="padding:16px 0;font-size:11px;color:#bbb;">nenhum livro cadastrado para este tema.</p>';

  var leiturasHtml = '<div class="leituras">' +
    '<div class="leituras-head"><span>leituras</span><a href="livros.html">ver biblioteca completa →</a></div>' +
    '<div id="livros-lista">' + livrosHtml + '</div>' +
    '</div>';

  /* Render */
  document.getElementById('main-content').innerHTML =
    introHtml +
    '<div class="columns">' + colVideos + colTextos + colLinks + colPods + colArtigos + '</div>' +
    leiturasHtml;

  /* limita cada coluna à altura de ~6 vídeos, com "ver tudo" pra expandir */
  capColunas();
  function capColunas() {
    var vItems = document.querySelectorAll('.col-body .v-item');
    var capH = 0;
    if (vItems.length) {
      var n = Math.min(6, vItems.length);
      capH = vItems[n - 1].getBoundingClientRect().bottom - vItems[0].getBoundingClientRect().top;
    }
    if (!capH) capH = 760;
    var bodies = [].slice.call(document.querySelectorAll('.col-body'));
    var cortou = false;
    bodies.forEach(function (b) {
      if (b.scrollHeight > capH + 40) { b.style.maxHeight = capH + 'px'; b.classList.add('capped'); cortou = true; }
    });
    if (!cortou) return;
    var wrap = document.createElement('div');
    wrap.className = 'ver-tudo-wrap';
    var btn = document.createElement('button');
    btn.className = 'ver-tudo';
    btn.textContent = 'ver tudo';
    btn.addEventListener('click', function () {
      bodies.forEach(function (b) { b.style.maxHeight = 'none'; b.classList.remove('capped'); });
      wrap.remove();
    });
    wrap.appendChild(btn);
    var cols = document.querySelector('.columns');
    cols.parentNode.insertBefore(wrap, cols.nextSibling);
  }
})();
</script>

</body>
</html>
