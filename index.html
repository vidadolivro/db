<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vida do livro db</title>
  <style>
    @font-face {
      font-family: 'Editorial New';
      src: url('fonts/PPEditorialNew-Regular.otf') format('opentype');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Editorial New';
      src: url('fonts/PPEditorialNew-Italic.otf') format('opentype');
      font-weight: 400; font-style: italic; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Haas Grotesk';
      src: url('fonts/Haas Grot Text R 55 Roman.ttf') format('truetype');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Haas Grotesk';
      src: url('fonts/Haas Grot Text R 56 Italic.ttf') format('truetype');
      font-weight: 400; font-style: italic; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Haas Grotesk';
      src: url('fonts/Haas Grot Text R 65 Medium.ttf') format('truetype');
      font-weight: 500; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Haas Grotesk';
      src: url('fonts/Haas Grot Text R 75 Bold.ttf') format('truetype');
      font-weight: 700; font-style: normal; font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8;
      --ink: #111;
      --mid: #777;
      --light: #bbb;
      --border: #ddd;
      --mono: "Courier New", Courier, monospace;
      --sans: "Neue Haas Grotesk", -apple-system, system-ui, sans-serif;
      --serif: "Editorial New", Georgia, serif;
    }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 52px 40px 80px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 48px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--ink);
      flex-wrap: wrap;
    }
    .site-title {
      font-family: var(--sans);
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1;
      text-transform: lowercase;
    }
    .site-title strong { font-weight: 500; }
    .site-sub {
      font-family: var(--serif);
      font-style: italic;
      font-size: 13px;
      color: var(--mid);
      margin-top: 6px;
    }
    .search-form { display: flex; flex-shrink: 0; }
    .search-form input {
      font-family: var(--sans);
      font-size: 11px;
      border: 1px solid var(--border);
      border-right: none;
      padding: 6px 12px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      width: 190px;
    }
    .search-form input::placeholder { color: var(--light); }
    .search-form input:focus { border-color: var(--ink); }
    .search-form button {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 6px 14px;
      background: var(--bg);
      color: var(--mid);
      cursor: pointer;
    }
    .search-form button:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    /* LABEL */
    .section-label {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--light);
      display: block;
      margin-bottom: 8px;
    }

    /* RECENTES */
    .recentes-section { margin-bottom: 52px; }
    .recentes-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .recente-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: var(--ink);
    }
    .recente-capa {
      aspect-ratio: 1 / 1;
      background-color: var(--ink);
      background-size: cover;
      background-position: center top;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .recente-capa-fallback {
      font-family: var(--serif);
      font-style: italic;
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      padding: 10px;
      line-height: 1.4;
    }
    .recente-tipo {
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--light);
      display: block;
      margin-bottom: 2px;
    }
    .recente-titulo {
      font-size: 11px;
      font-weight: 500;
      line-height: 1.35;
      display: block;
      margin-bottom: 3px;
    }
    .recente-tema {
      font-size: 9px;
      color: var(--light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .recente-card:hover .recente-titulo { text-decoration: underline; text-underline-offset: 2px; }
    .recente-capa--video { background-color: var(--ink); position: relative; }
    .recente-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; color: rgba(255,255,255,0.28); }
    .recente-canal { position: absolute; bottom: 10px; left: 10px; font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.28); }
    .recente-capa--texto { background-color: #f0efe8; position: relative; }
    .recente-capa-tag { position: absolute; top: 10px; left: 10px; font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid); }
    .recente-trecho { position: absolute; bottom: 10px; left: 10px; right: 10px; font-style: italic; font-size: 10px; line-height: 1.5; color: var(--mid); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
    .recente-capa--link { background-color: var(--bg); border: 1px solid var(--border); position: relative; }
    .recente-domain { position: absolute; bottom: 10px; left: 10px; font-family: var(--mono); font-size: 10px; color: var(--mid); }

    /* TOPICS */
    .index-section { margin-bottom: 52px; }
    .index-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 64px;
    }
    .index-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--ink);
    }
    .index-item:first-child { border-top: 1px solid var(--border); }
    .idx-num {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--light);
      letter-spacing: 0.1em;
      min-width: 16px;
      flex-shrink: 0;
      transition: color 0.1s;
    }
    .idx-icon {
      width: 14px; height: 14px;
      flex-shrink: 0;
      color: var(--ink);
      opacity: 0.55;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.1s;
    }
    .idx-icon svg { width: 14px; height: 14px; display: block; }
    .idx-name { font-size: 12px; font-weight: 500; letter-spacing: 0.01em; flex: 1; }
    .idx-arrow { font-size: 10px; color: var(--border); opacity: 0; transition: opacity 0.1s; flex-shrink: 0; }
    .index-item:hover .idx-num   { color: var(--ink); }
    .index-item:hover .idx-icon  { opacity: 1; }
    .index-item:hover .idx-arrow { opacity: 1; color: var(--mid); }
    .index-item:hover .idx-name  { text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--border); }

    /* SEPARATOR */
    .sep { border: none; border-top: 1px solid var(--border); margin: 0 0 40px; }

    /* DIRECTORY */
    .dir-section { margin-bottom: 52px; }
    .dir-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .dir-desc { font-size: 11px; color: var(--mid); letter-spacing: 0.03em; }
    .dir-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    .dir-card {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .dir-icon { width: 18px; height: 18px; flex-shrink: 0; color: var(--ink); opacity: 0.4; display: flex; align-items: center; justify-content: center; transition: opacity 0.1s; }
    .dir-icon svg { width: 18px; height: 18px; display: block; }
    .dir-card-name { font-size: 11px; color: var(--mid); letter-spacing: 0.01em; flex: 1; transition: color 0.1s; line-height: 1.3; }
    .dir-card-arrow { font-size: 10px; color: var(--border); opacity: 0; transition: opacity 0.1s; }
    .dir-card:hover .dir-icon       { opacity: 1; }
    .dir-card:hover .dir-card-name  { color: var(--ink); }
    .dir-card:hover .dir-card-arrow { opacity: 1; }
    .dir-card.dir-card--wide {
      grid-column: 1 / -1;
      border-top: none;
    }
    .dir-card--wide .dir-card-desc {
      font-size: 10px;
      color: var(--light);
      letter-spacing: 0.04em;
    }
    .dir-card:hover .dir-card-desc { color: var(--mid); }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 16px 40px;
      max-width: 900px; width: 100%;
      margin: 0 auto;
      font-family: var(--mono);
      font-size: 10px; color: var(--light); letter-spacing: 0.08em;
      display: flex; justify-content: space-between;
    }

    @media (max-width: 640px) {
      main { padding: 24px 16px 60px; }
      footer { padding: 12px 16px; }
      .header { flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 32px; }
      .search-form { width: 100%; }
      .search-form input { flex: 1; width: auto; }
      .recentes-grid { grid-template-columns: repeat(2, 1fr); }
      .index-grid { grid-template-columns: 1fr; }
      #col2 .index-item:first-child { border-top: none; }
      .dir-cards { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 380px) {
      .dir-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<main>

  <div class="header">
    <div>
      <h1 class="site-title"><strong>vida do livro</strong> db</h1>
      <p class="site-sub">referências para o mercado editorial</p>
    </div>
    <form class="search-form" onsubmit="return false">
      <input type="text" placeholder="buscar...">
      <button type="submit">buscar</button>
    </form>
  </div>

  <section class="recentes-section" id="recentes-sec">
    <span class="section-label">adicionados recentemente</span>
    <div class="recentes-grid" id="recentes-grid"></div>
  </section>

  <section class="index-section">
    <span class="section-label">temas</span>
    <div class="index-grid">
      <div id="col1"></div>
      <div id="col2"></div>
    </div>
  </section>

  <hr class="sep">

  <section class="dir-section">
    <div class="dir-header">
      <span class="section-label" style="margin-bottom:0">diretório</span>
      <span class="dir-desc">pessoas, editoras e organizações do mercado editorial</span>
    </div>
    <div class="dir-cards" id="dirCards"></div>
  </section>

</main>
<footer>
  <span>vida do livro db</span>
  <span>2025</span>
</footer>

<script src="dados/livros.js"></script>
<script src="dados/temas.js"></script>
<script>
  /* SVG pixel-art icons — 16×16 */
  const ic  = d => `<svg viewBox="0 0 16 16" fill="currentColor" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">${d}</svg>`;
  const r   = (x,y,w,h) => `<rect x="${x}" y="${y}" width="${w}" height="${h}"/>`;
  const bg  = (x,y,w,h) => `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="var(--bg,#fafaf8)"/>`;
  const pol = pts => `<polygon points="${pts}"/>`;

  const ICONS = [
    ic(pol("10,0 16,6 6,16 0,10") + bg(12,0,4,3) + bg(0,13,3,3)),
    ic(r(3,0,10,4) + bg(5,0,6,4) + r(0,3,16,13) + bg(1,4,14,11) + r(0,8,16,2) + r(6,7,4,3) + bg(7,7,2,3)),
    ic(r(0,2,8,8) + bg(2,4,4,4) + r(3,5,2,2) + r(8,6,8,2) + r(12,8,2,3) + r(10,8,2,2)),
    ic(r(0,1,7,14) + r(9,1,7,14) + r(7,0,2,16) + bg(1,2,5,12) + bg(10,2,5,12)),
    ic(r(2,0,12,16) + bg(3,1,10,14) + r(4,4,6,1) + r(4,7,6,1) + r(4,10,4,1) + pol("9,9 11,7 14,11 11,14 9,12") + bg(10,8,3,5)),
    ic(r(0,3,11,2) + pol("9,0 16,4 9,8") + r(5,11,11,2) + pol("7,8 0,12 7,16")),
    ic(r(2,2,9,9) + bg(3,3,7,7) + r(5,5,2,2) + r(9,9,2,2) + r(11,11,2,2) + r(13,13,2,2)),
    ic(r(0,5,16,6) + bg(1,6,14,4) + r(2,5,1,4) + r(4,5,1,3) + r(6,5,1,4) + r(8,5,1,3) + r(10,5,1,4) + r(12,5,1,3) + r(14,5,1,4)),
    ic(r(1,0,14,3) + bg(2,1,12,1) + r(0,3,16,4) + bg(1,4,14,2) + r(2,7,12,9) + bg(3,8,10,7) + r(4,9,8,1) + r(4,11,6,1)),
    ic(r(2,0,12,16) + bg(3,1,10,13) + r(4,3,8,1) + r(4,5,8,1) + r(4,7,8,1) + r(4,9,6,1) + r(6,14,4,1)),
    ic(r(3,1,10,2) + r(1,2,3,10) + bg(2,3,2,8) + r(12,2,3,10) + bg(13,3,2,8)),
    ic(pol("0,4 0,12 5,12 5,4") + pol("5,1 15,0 15,16 5,15") + r(8,12,3,4)),
    ic(r(0,0,10,8) + bg(1,1,8,6) + r(1,8,3,2) + r(6,6,10,8) + bg(7,7,8,6) + r(13,14,3,2)),
    ic(r(7,0,2,6) + r(1,8,2,8) + r(13,8,2,8) + r(1,14,4,2) + r(11,14,4,2) + r(2,6,12,3)),
    ic(pol("3,0 16,0 16,13 3,13 0,6") + bg(4,1,11,11) + r(12,2,2,2) + bg(13,3,1,1)),
    ic(r(0,0,16,4) + r(0,5,16,4) + r(0,10,16,4) + r(0,14,16,2) + bg(2,1,12,2) + bg(2,6,12,2) + bg(2,11,12,2)),
    ic(r(3,2,10,2) + r(0,4,16,12) + bg(1,5,14,10) + r(2,7,4,4) + r(10,7,4,4) + r(6,11,4,5) + r(0,14,16,2)),
    ic(r(0,14,16,2) + r(0,9,4,5) + r(6,5,4,9) + r(12,1,4,13)),
    ic(r(6,0,4,4) + r(4,4,8,4) + r(6,8,4,8) + r(10,0,6,2) + r(14,2,2,6) + r(10,6,4,2) + pol("11,0 16,6 13,6 13,14 14,14") + bg(11,2,5,4)),
    ic(r(5,0,6,3) + r(4,3,8,2) + r(3,5,10,9) + pol("3,14 6,16 10,16 13,14") + bg(6,6,4,3)),
    ic(r(0,0,7,7) + bg(1,1,5,5) + r(9,0,7,7) + bg(10,1,5,5) + r(0,9,7,7) + bg(1,10,5,5) + r(9,9,7,7) + bg(10,10,5,5)),
    ic(r(4,0,8,1) + r(2,1,12,5) + r(1,3,14,4) + r(2,6,12,3) + r(4,9,8,2) + r(4,11,8,2) + r(5,13,6,1) + bg(4,1,8,7)),
  ];

  const di  = d => `<svg viewBox="0 0 16 16" fill="currentColor" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">${d}</svg>`;
  const DIR_ICONS = [
    di(r(1,4,14,12) + bg(2,5,12,10) + r(3,7,4,4) + r(9,7,4,4) + r(6,11,4,5) + r(4,0,2,5) + r(6,1,6,3)),
    di(r(4,0,8,4) + bg(6,0,4,4) + r(0,3,16,13) + bg(1,4,14,10) + r(0,7,16,2) + r(6,6,4,3) + bg(7,6,2,3)),
    di(r(0,0,12,9) + bg(1,1,10,7) + r(1,9,4,2) + r(1,11,2,2) + pol("10,7 14,4 14,14 10,11")),
    di(r(12,0,4,4) + r(10,4,4,4) + r(8,6,4,4) + r(6,8,4,4) + r(4,10,4,4) + r(2,12,4,4) + bg(3,13,2,2) + r(0,13,4,3)),
    di(r(2,0,12,4) + r(0,4,16,6) + bg(1,5,14,4) + r(2,10,12,6) + bg(3,11,10,4) + r(4,12,8,1) + r(4,14,6,1)),
    di(r(0,0,16,16) + bg(1,1,14,14) + r(2,2,12,4) + r(2,8,12,1) + r(2,10,12,1) + r(2,12,8,1) + r(12,0,4,7) + bg(13,1,2,5)),
    di(pol("10,0 14,4 4,14 0,10") + bg(12,0,3,2) + bg(0,12,2,3) + r(0,13,2,3) + r(1,12,3,1)),
    di(r(0,2,16,12) + bg(1,3,14,10) + r(4,5,2,6) + r(6,6,2,4) + r(8,7,2,2) + r(10,0,6,3)),
    di(r(0,6,16,4) + pol("3,6 8,0 13,6") + r(12,8,2,7) + r(10,14,4,1) + r(3,10,10,6)),
    di(r(0,2,4,12) + bg(1,3,2,10) + r(6,0,4,14) + bg(7,1,2,12) + r(12,2,4,12) + bg(13,3,2,10) + r(0,14,16,2)),
  ];

  const TOPICS = [
    {n:"criação literária",     href:"tema?slug=criacao-literaria"},
    {n:"agentes literários",    href:"tema?slug=agentes-literarios"},
    {n:"direitos editoriais",   href:"tema?slug=direitos-editoriais"},
    {n:"autor e editora",       href:"tema?slug=autor-editora"},
    {n:"coordenação editorial", href:"tema?slug=coordenacao-editorial"},
    {n:"tradução",              href:"tema?slug=traducao"},
    {n:"preparação e revisão",  href:"tema?slug=preparacao-revisao"},
    {n:"design gráfico",        href:"tema?slug=design-grafico"},
    {n:"produção gráfica",      href:"tema?slug=producao-grafica"},
    {n:"e-books",               href:"tema?slug=ebooks"},
    {n:"audiolivros",           href:"tema?slug=audiolivros"},
    {n:"marketing editorial",   href:"tema?slug=marketing-editorial"},
    {n:"comunicação e mídia",   href:"tema?slug=comunicacao-midia"},
    {n:"distribuição",          href:"tema?slug=distribuicao"},
    {n:"pontos de venda",       href:"tema?slug=pontos-de-venda"},
    {n:"clubes do livro",       href:"tema?slug=clubes-do-livro"},
    {n:"ter uma editora",       href:"tema?slug=ter-uma-editora"},
    {n:"dados do mercado",      href:"tema?slug=dados-do-mercado"},
    {n:"autopublicação",        href:"tema?slug=autopublicacao"},
    {n:"livros infantis",       href:"tema?slug=literatura-infantil"},
    {n:"quadrinhos",            href:"tema?slug=quadrinhos"},
    {n:"futuro e tecnologia",   href:"tema?slug=futuro-tecnologia"},
  ];

  const DIR = [
    {n:"editoras",               href:"diretorio?tipo=editoras"},
    {n:"agentes literários",     href:"diretorio?tipo=agentes"},
    {n:"tradutores",             href:"diretorio?tipo=tradutores"},
    {n:"designers",              href:"diretorio?tipo=designers"},
    {n:"produção gráfica",       href:"diretorio?tipo=producao"},
    {n:"veículos",               href:"diretorio?tipo=veiculos"},
    {n:"jornalistas",            href:"diretorio?tipo=jornalistas"},
    {n:"influencers e creators", href:"diretorio?tipo=influencers"},
    {n:"escolas e cursos",       href:"diretorio?tipo=escolas"},
    {n:"biblioteca",             href:"livros.html", desc:"referências bibliográficas por tema"},
  ];

  /* Recentes — 1 de cada tipo */
  (function() {
    const slugToNome = {};
    TOPICS.forEach(t => { slugToNome[t.href.replace('tema?slug=', '')] = t.n; });

    const livros   = (window.LIVROS || []).filter(l => l.macrotema);
    const temasMap = window.TEMAS || {};

    let ultimoVideo = null, ultimoTexto = null, ultimoLink = null;
    Object.keys(temasMap).forEach(slug => {
      const t = temasMap[slug];
      if (t.videos  && t.videos.length)  ultimoVideo = { tipo: 'video', slug, item: t.videos[t.videos.length - 1] };
      if (t.textos  && t.textos.length)  ultimoTexto = { tipo: 'texto', slug, item: t.textos[t.textos.length - 1] };
      if (t.links   && t.links.length)   ultimoLink  = { tipo: 'link',  slug, item: t.links[t.links.length - 1] };
    });
    const ultimoLivro = livros.length ? { tipo: 'livro', item: livros[livros.length - 1] } : null;

    const entries = [ultimoLivro, ultimoVideo, ultimoTexto, ultimoLink].filter(Boolean);

    const grid = document.getElementById('recentes-grid');
    const sec  = document.getElementById('recentes-sec');
    if (!entries.length) { if (sec) sec.style.display = 'none'; return; }

    grid.innerHTML = entries.map(entry => {
      const tipo = entry.tipo;
      const temaSlug = entry.slug || (entry.item && entry.item.temas && entry.item.temas[0]) || '';
      const temaNome = slugToNome[temaSlug] || temaSlug;

      if (tipo === 'video') {
        const v = entry.item;
        return '<a href="tema?slug=' + entry.slug + '" class="recente-card">' +
          '<div class="recente-capa recente-capa--video">' +
            '<span class="recente-play">▶</span>' +
            '<span class="recente-canal">' + (v.canal || '') + '</span>' +
          '</div>' +
          '<span class="recente-tipo">vídeo</span>' +
          '<span class="recente-titulo">' + v.titulo + '</span>' +
          '<span class="recente-tema">' + temaNome + '</span>' +
          '</a>';
      }
      if (tipo === 'texto') {
        const tx = entry.item;
        return '<a href="tema?slug=' + entry.slug + '" class="recente-card">' +
          '<div class="recente-capa recente-capa--texto">' +
            '<span class="recente-capa-tag">' + (tx.tag || 'texto') + '</span>' +
            '<span class="recente-trecho">' + (tx.trecho || '') + '</span>' +
          '</div>' +
          '<span class="recente-tipo">texto</span>' +
          '<span class="recente-titulo">' + tx.titulo + '</span>' +
          '<span class="recente-tema">' + temaNome + '</span>' +
          '</a>';
      }
      if (tipo === 'link') {
        const lk = entry.item;
        return '<a href="tema?slug=' + entry.slug + '" class="recente-card">' +
          '<div class="recente-capa recente-capa--link">' +
            '<span class="recente-domain">→ ' + (lk.domain || '') + '</span>' +
          '</div>' +
          '<span class="recente-tipo">link</span>' +
          '<span class="recente-titulo">' + lk.titulo + '</span>' +
          '<span class="recente-tema">' + temaNome + '</span>' +
          '</a>';
      }
      /* livro */
      const l = entry.item;
      const ls = (l.temas || [])[0] || '';
      const capaStyle = l.capa ? 'background-image:url(\'' + l.capa.replace(/'/g, '%27') + '\')' : '';
      const fallback  = !l.capa ? '<span class="recente-capa-fallback">' + l.titulo + '</span>' : '';
      return '<a href="tema?slug=' + ls + '" class="recente-card">' +
        '<div class="recente-capa" style="' + capaStyle + '">' + fallback + '</div>' +
        '<span class="recente-tipo">livro</span>' +
        '<span class="recente-titulo">' + l.titulo + '</span>' +
        '<span class="recente-tema">' + (slugToNome[ls] || ls) + '</span>' +
        '</a>';
    }).join('');
  })();

  /* Topics */
  const half = Math.ceil(TOPICS.length / 2);
  TOPICS.forEach((t, i) => {
    const a = document.createElement("a");
    a.href = t.href;
    a.className = "index-item";
    a.innerHTML = `
      <span class="idx-num">${String(i+1).padStart(2,"0")}</span>
      <span class="idx-icon">${ICONS[i]||""}</span>
      <span class="idx-name">${t.n}</span>
      <span class="idx-arrow">→</span>`;
    document.getElementById(i < half ? "col1" : "col2").appendChild(a);
  });

  /* Directory */
  DIR.forEach((d, i) => {
    const a = document.createElement("a");
    a.href = d.href;
    a.className = "dir-card" + (d.desc ? " dir-card--wide" : "");
    a.innerHTML = `
      <span class="dir-icon">${DIR_ICONS[i]||""}</span>
      <span class="dir-card-name">${d.n}</span>
      ${d.desc ? `<span class="dir-card-desc">${d.desc}</span>` : ""}
      <span class="dir-card-arrow">→</span>`;
    document.getElementById("dirCards").appendChild(a);
  });
</script>
</body>
</html>
