<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">diretório — vida do livro db</title>
  <style>
    @font-face {
      font-family: 'Editorial New';
      src: url('fonts/PPEditorialNew-Regular.otf') format('opentype');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Haas Grotesk';
      src: url('fonts/Haas Grot Text R 55 Roman.ttf') format('truetype');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Haas Grotesk';
      src: url('fonts/Haas Grot Text R 65 Medium.ttf') format('truetype');
      font-weight: 500; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Haas Grotesk';
      src: url('fonts/Haas Grot Text R 75 Bold.ttf') format('truetype');
      font-weight: 700; font-style: normal; font-display: swap;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8;
      --ink: #111;
      --mid: #1a1a1a;
      --light: #1a1a1a;
      --border: #ddd;
      --mono: "Courier New", Courier, monospace;
      --sans: "Neue Haas Grotesk", -apple-system, system-ui, sans-serif;
      --serif: "Editorial New", Georgia, serif;
    }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
    }
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 40px 80px;
    }

    /* NAV */
    .topnav {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 28px;
    }
    .back {
      font-size: 13px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .back:hover { text-decoration: underline; }
    .breadcrumb {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--light);
    }

    /* HEADER */
    .page-header {
      padding-bottom: 20px;
      border-bottom: 1px solid var(--ink);
      margin-bottom: 20px;
    }
    .page-title {
      font-family: var(--serif);
      font-size: 30px;
      font-weight: 400;
      text-transform: lowercase;
      line-height: 1;
      margin-bottom: 5px;
    }
    .page-desc {
      font-size: 13px;
      color: var(--mid);
      letter-spacing: 0.02em;
    }

    /* FILTERS */
    .filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      margin-bottom: 16px;
    }
    .filter-label {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--light);
      margin-right: 6px;
    }
    .filter-btn {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      border: 1px solid var(--border);
      padding: 3px 8px;
      background: var(--bg);
      color: var(--mid);
      cursor: pointer;
      transition: all 0.08s;
      line-height: 1.4;
    }
    .filter-btn:hover { border-color: var(--ink); color: var(--ink); }
    .filter-btn.active {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    /* COUNT BAR */
    .count-bar {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--light);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 7px 0;
      margin-bottom: 0;
    }

    /* LETTER DIVIDER */
    .letter-head {
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--light);
      padding: 12px 0 3px;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .letter-head::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ENTRY ROW */
    .entry {
      display: grid;
      grid-template-columns: 265px 115px 1fr 145px 18px;
      align-items: center;
      gap: 0 12px;
      padding: 8px 6px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--ink);
      transition: background 0.06s;
    }
    .entry:hover { background: var(--ink); color: var(--bg); }
    .entry:hover .e-cat   { color: #aaa; }
    .entry:hover .e-desc  { color: #888; }
    .entry:hover .e-loc   { color: #888; }
    .entry:hover .e-arrow { opacity: 1; color: var(--bg); }
    .entry:hover .e-tag   { border-color: #555; color: #ccc; }

    /* name col */
    .e-name {
      display: flex;
      align-items: baseline;
      gap: 7px;
      overflow: hidden;
    }
    /* ── EDITORAS: colunas próprias + ícones ── */
    .ed-row {
      display: grid;
      grid-template-columns: 155px 150px 105px 1fr 125px 56px;
      align-items: center;
      gap: 0 12px;
      padding: 8px 6px;
      border-bottom: 1px solid var(--border);
      color: var(--ink);
    }
    .ed-row:hover { background: #f2f0ea; }
    .e-selo { font-weight: bold; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .e-grupo { font-size: 12px; color: var(--mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .e-acts { display: flex; gap: 10px; justify-content: flex-end; align-items: center; }
    .e-ic { color: var(--light); display: inline-flex; align-items: center; }
    .e-ic:hover { color: var(--ink); }
    @media (max-width: 660px) {
      .ed-row { grid-template-columns: 1fr auto; }
      .ed-row .e-grupo, .ed-row .e-cat, .ed-row .e-desc, .ed-row .e-loc { display: none; }
    }
    .e-main {
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .e-sub {
      font-size: 13px;
      color: var(--mid);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 2;
    }
    .entry:hover .e-sub { color: #aaa; }

    /* category col */
    .e-cat {
      font-size: 12px;
      color: var(--mid);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* description col */
    .e-desc {
      font-size: 13px;
      color: var(--light);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* location/detail col */
    .e-loc {
      font-size: 12px;
      color: var(--light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }
    .e-tags {
      display: flex;
      gap: 3px;
      flex-wrap: nowrap;
      justify-content: flex-end;
    }
    .e-tag {
      font-size: 10px;
      letter-spacing: 0.1em;
      border: 1px solid var(--border);
      padding: 1px 5px;
      color: var(--mid);
      white-space: nowrap;
    }

    /* arrow col */
    .e-arrow {
      font-size: 12px;
      opacity: 0;
      color: var(--mid);
      text-align: right;
    }

    /* EMPTY STATE */
    .empty {
      padding: 40px 0;
      font-size: 13px;
      color: var(--light);
      letter-spacing: 0.1em;
    }

    /* NOT FOUND */
    .not-found { padding: 40px 0; font-size: 14px; color: var(--mid); }

    /* FOOTER */
    footer {
      max-width: 1000px;
      margin: 0 auto;
      padding: 14px 40px;
      font-size: 12px;
      color: var(--light);
      letter-spacing: 0.08em;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 660px) {
      main { padding: 20px 16px 60px; }
      footer { padding: 14px 16px; }
      .entry { grid-template-columns: 1fr auto 16px; }
      .e-cat, .e-desc { display: none; }
    }
  </style>
  <link rel="stylesheet" href="theme.css">
  <script src="theme.js"></script>
</head>
<body>
<main>
  <div class="topnav">
    <a class="back" href="index.html">← início</a>
    <span class="breadcrumb">diretório</span>
  </div>
  <div id="main-content"></div>
</main>
<footer>
  <span>vida do livro db</span>
  <span>2025</span>
</footer>

<script src="dados/db-dirs.js"></script>
<script src="dados/diretorios.js"></script>
<script>
(function () {
  var tipo = new URLSearchParams(window.location.search).get('tipo') || '';
  var DIRS = Object.assign({}, window.DIRETORIOS || {}, window.DB_DIRS || {});
  var d = DIRS[tipo];

  if (!d) {
    document.getElementById('page-title').textContent = 'diretório não encontrado';
    document.getElementById('main-content').innerHTML =
      '<p class="not-found">← <a href="index.html">voltar ao início</a></p>';
    return;
  }

  document.getElementById('page-title').textContent = d.titulo + ' — vida do livro db';

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* Sort: by c1 */
  function sortKey(e) { return limpaNome(e.selo || e.c1 || ''); }
  var sorted = (d.data || []).slice().sort(function(a, b) {
    return sortKey(a).localeCompare(sortKey(b), 'pt');
  });

  var activeFilter = 'todos';

  function getFirstWord(str) {
    return (str || '').trim().split(/\s+/)[0].toUpperCase();
  }

  var IG_SVG = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.3" cy="6.7" r="1.1" fill="currentColor" stroke="none"/></svg>';
  var SITE_SVG = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.6 2.4 4 5.6 4 9s-1.4 6.6-4 9c-2.6-2.4-4-5.6-4-9s1.4-6.6 4-9z"/></svg>';

  /* tira a palavra "editora" do nome (ex: "Editora Tabla" -> "Tabla") */
  function limpaNome(s) {
    return (s || '').replace(/\beditoras?\b/gi, '').replace(/\s{2,}/g, ' ').trim();
  }

  function renderEditoraRow(e) {
    var selo  = limpaNome(e.selo || e.c1);
    var grupo = (e.c1 && e.c1 !== e.selo) ? limpaNome(e.c1) : '';
    var ig    = (e.instagram || '').replace(/^@/, '').trim();
    var igLink = ig
      ? '<a class="e-ic" href="https://instagram.com/' + esc(ig) + '" target="_blank" rel="noopener" title="' + esc(e.instagram) + '">' + IG_SVG + '</a>'
      : '';
    var siteLink = e.href
      ? '<a class="e-ic" href="' + esc(e.href) + '" target="_blank" rel="noopener" title="site">' + SITE_SVG + '</a>'
      : '';
    return '<div class="ed-row">' +
      '<div class="e-selo">' + esc(selo) + '</div>' +
      '<div class="e-grupo">' + esc(grupo) + '</div>' +
      '<div class="e-cat">' + esc(e.c2 || '') + '</div>' +
      '<div class="e-desc">' + esc(e.c3 || '') + '</div>' +
      '<div class="e-loc">' + esc(e.c4 || '') + '</div>' +
      '<div class="e-acts">' + igLink + siteLink + '</div>' +
    '</div>';
  }

  function renderRow(e) {
    if (e.selo) return renderEditoraRow(e);
    /* demais diretórios: 1ª palavra em destaque + resto */
    var parts = (e.c1 || '').trim().split(/\s+/);
    var main, sub;
    if (parts.length >= 2) { main = parts[0]; sub = parts.slice(1).join(' '); }
    else { main = e.c1 || ''; sub = ''; }
    var subHtml = sub ? '<span class="e-sub">' + esc(sub) + '</span>' : '';
    var newTab  = e.href ? ' target="_blank" rel="noopener"' : '';
    return '<a href="' + esc(e.href || '#') + '" class="entry"' + newTab + '>' +
      '<div class="e-name"><span class="e-main">' + esc(main) + '</span>' + subHtml + '</div>' +
      '<div class="e-cat">' + esc(e.c2 || '') + '</div>' +
      '<div class="e-desc">' + esc(e.c3 || '') + '</div>' +
      '<div class="e-loc">' + esc(e.c4 || '') + '</div>' +
      '<div class="e-arrow">→</div>' +
    '</a>';
  }

  function render() {
    var filtered = sorted.filter(function(e) {
      return activeFilter === 'todos' || (e.tags && e.tags.indexOf(activeFilter) !== -1);
    });

    var countEl = document.getElementById('dir-count');
    if (countEl) {
      countEl.textContent = '— ' + filtered.length + ' ' +
        (filtered.length === 1 ? 'entrada' : 'entradas') + ' —';
    }

    var listEl = document.getElementById('dir-list');
    if (!listEl) return;

    if (!filtered.length) {
      listEl.innerHTML = '<p class="empty">nenhum resultado para este filtro.</p>';
      return;
    }

    /* Group by first letter (selo, ou c1) */
    var groups = {};
    filtered.forEach(function(e) {
      var letter = (sortKey(e) || 'X')[0].toUpperCase();
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(e);
    });

    listEl.innerHTML = Object.keys(groups).sort().map(function(letter) {
      return '<div class="letter-group">' +
        '<div class="letter-head">' + letter + '</div>' +
        groups[letter].map(renderRow).join('') +
      '</div>';
    }).join('');
  }

  /* Build filter buttons */
  var filtros = d.filtros || ['todos'];
  var btnsHtml = filtros.map(function(f) {
    return '<button class="filter-btn' + (f === 'todos' ? ' active' : '') +
      '" data-filter="' + esc(f) + '">' + esc(f) + '</button>';
  }).join('');

  /* Render page */
  document.getElementById('main-content').innerHTML =
    '<div class="page-header">' +
      '<h1 class="page-title">' + esc(d.titulo) + '</h1>' +
      '<p class="page-desc">' + esc(d.desc) + '</p>' +
    '</div>' +
    '<div class="filters">' +
      '<span class="filter-label">' + esc(d.filtroLabel || 'filtro') + '</span>' +
      btnsHtml +
    '</div>' +
    '<div class="count-bar" id="dir-count">— 0 entradas —</div>' +
    '<div id="dir-list"></div>';

  /* Wire up filter buttons */
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  render();
})();
</script>
</body>
</html>
