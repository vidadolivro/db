<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">diretório — vida do livro db</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8;
      --ink: #111;
      --mid: #777;
      --light: #bbb;
      --border: #ddd;
      --mono: "Courier New", Courier, monospace;
    }
    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.5;
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 40px 80px;
    }

    /* NAV */
    .topnav {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 28px;
    }
    .back {
      font-size: 12px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .back:hover { text-decoration: underline; }
    .breadcrumb {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--light);
    }

    /* HEADER */
    .page-header {
      padding-bottom: 20px;
      border-bottom: 1px solid var(--ink);
      margin-bottom: 20px;
    }
    .page-title {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 0.01em;
      text-transform: lowercase;
      line-height: 1;
      margin-bottom: 5px;
    }
    .page-desc {
      font-size: 11px;
      color: var(--mid);
      letter-spacing: 0.02em;
    }

    /* FILTERS */
    .filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      margin-bottom: 16px;
    }
    .filter-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--light);
      margin-right: 6px;
    }
    .filter-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      border: 1px solid var(--border);
      padding: 3px 8px;
      background: var(--bg);
      color: var(--mid);
      cursor: pointer;
      transition: all 0.08s;
      line-height: 1.4;
    }
    .filter-btn:hover { border-color: var(--ink); color: var(--ink); }
    .filter-btn.active {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    /* COUNT BAR */
    .count-bar {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--light);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 7px 0;
      margin-bottom: 0;
    }

    /* LETTER DIVIDER */
    .letter-head {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--light);
      padding: 12px 0 3px;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .letter-head::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ENTRY ROW */
    .entry {
      display: grid;
      grid-template-columns: 210px 110px 1fr 100px 18px;
      align-items: center;
      gap: 0 12px;
      padding: 8px 6px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--ink);
      transition: background 0.06s;
    }
    .entry:hover { background: var(--ink); color: var(--bg); }
    .entry:hover .e-cat   { color: #aaa; }
    .entry:hover .e-desc  { color: #888; }
    .entry:hover .e-loc   { color: #888; }
    .entry:hover .e-arrow { opacity: 1; color: var(--bg); }
    .entry:hover .e-tag   { border-color: #555; color: #ccc; }

    /* name col */
    .e-name {
      display: flex;
      align-items: baseline;
      gap: 7px;
      overflow: hidden;
    }
    .e-main {
      font-weight: bold;
      font-size: 12px;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .e-sub {
      font-size: 11px;
      color: var(--mid);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 2;
    }
    .entry:hover .e-sub { color: #aaa; }

    /* category col */
    .e-cat {
      font-size: 10px;
      color: var(--mid);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* description col */
    .e-desc {
      font-size: 11px;
      color: var(--light);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* location/detail col */
    .e-loc {
      font-size: 10px;
      color: var(--light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }
    .e-tags {
      display: flex;
      gap: 3px;
      flex-wrap: nowrap;
      justify-content: flex-end;
    }
    .e-tag {
      font-size: 8px;
      letter-spacing: 0.1em;
      border: 1px solid var(--border);
      padding: 1px 5px;
      color: var(--mid);
      white-space: nowrap;
    }

    /* arrow col */
    .e-arrow {
      font-size: 10px;
      opacity: 0;
      color: var(--mid);
      text-align: right;
    }

    /* EMPTY STATE */
    .empty {
      padding: 40px 0;
      font-size: 11px;
      color: var(--light);
      letter-spacing: 0.1em;
    }

    /* NOT FOUND */
    .not-found { padding: 40px 0; font-size: 13px; color: var(--mid); }

    /* FOOTER */
    footer {
      max-width: 920px;
      margin: 0 auto;
      padding: 14px 40px;
      font-size: 10px;
      color: var(--light);
      letter-spacing: 0.08em;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 660px) {
      main { padding: 20px 16px 60px; }
      footer { padding: 14px 16px; }
      .entry { grid-template-columns: 1fr auto 16px; }
      .e-cat, .e-desc { display: none; }
    }
  </style>
</head>
<body>
<main>
  <div class="topnav">
    <a class="back" href="index.html">← início</a>
    <span class="breadcrumb">diretório</span>
  </div>
  <div id="main-content"></div>
</main>
<footer>
  <span>vida do livro db</span>
  <span>2025</span>
</footer>

<script src="dados/diretorios.js"></script>
<script>
(function () {
  var tipo = new URLSearchParams(window.location.search).get('tipo') || '';
  var DIRS = window.DIRETORIOS || {};
  var d = DIRS[tipo];

  if (!d) {
    document.getElementById('page-title').textContent = 'diretório não encontrado';
    document.getElementById('main-content').innerHTML =
      '<p class="not-found">← <a href="index.html">voltar ao início</a></p>';
    return;
  }

  document.getElementById('page-title').textContent = d.titulo + ' — vida do livro db';

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* Sort: by c1 */
  var sorted = (d.data || []).slice().sort(function(a, b) {
    return (a.c1 || '').localeCompare(b.c1 || '', 'pt');
  });

  var activeFilter = 'todos';

  function getFirstWord(str) {
    return (str || '').trim().split(/\s+/)[0].toUpperCase();
  }

  function renderRow(e) {
    /* Split c1 into first word (bold) + remainder (lighter) if it's multi-word */
    var parts = (e.c1 || '').trim().split(/\s+/);
    var main, sub;
    if (parts.length >= 2) {
      main = parts[0];
      sub = parts.slice(1).join(' ');
    } else {
      main = e.c1 || '';
      sub = '';
    }
    var subHtml = sub ? '<span class="e-sub">' + esc(sub) + '</span>' : '';
    /* Col 4: show c4 as text or as tags if short */
    var col4Html = '<div class="e-loc">' + esc(e.c4 || '') + '</div>';

    return '<a href="' + esc(e.href || '#') + '" class="entry">' +
      '<div class="e-name"><span class="e-main">' + esc(main) + '</span>' + subHtml + '</div>' +
      '<div class="e-cat">' + esc(e.c2 || '') + '</div>' +
      '<div class="e-desc">' + esc(e.c3 || '') + '</div>' +
      col4Html +
      '<div class="e-arrow">→</div>' +
    '</a>';
  }

  function render() {
    var filtered = sorted.filter(function(e) {
      return activeFilter === 'todos' || (e.tags && e.tags.indexOf(activeFilter) !== -1);
    });

    var countEl = document.getElementById('dir-count');
    if (countEl) {
      countEl.textContent = '— ' + filtered.length + ' ' +
        (filtered.length === 1 ? 'entrada' : 'entradas') + ' —';
    }

    var listEl = document.getElementById('dir-list');
    if (!listEl) return;

    if (!filtered.length) {
      listEl.innerHTML = '<p class="empty">nenhum resultado para este filtro.</p>';
      return;
    }

    /* Group by first letter of c1 */
    var groups = {};
    filtered.forEach(function(e) {
      var letter = (e.c1 || 'X')[0].toUpperCase();
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(e);
    });

    listEl.innerHTML = Object.keys(groups).sort().map(function(letter) {
      return '<div class="letter-group">' +
        '<div class="letter-head">' + letter + '</div>' +
        groups[letter].map(renderRow).join('') +
      '</div>';
    }).join('');
  }

  /* Build filter buttons */
  var filtros = d.filtros || ['todos'];
  var btnsHtml = filtros.map(function(f) {
    return '<button class="filter-btn' + (f === 'todos' ? ' active' : '') +
      '" data-filter="' + esc(f) + '">' + esc(f) + '</button>';
  }).join('');

  /* Render page */
  document.getElementById('main-content').innerHTML =
    '<div class="page-header">' +
      '<h1 class="page-title">' + esc(d.titulo) + '</h1>' +
      '<p class="page-desc">' + esc(d.desc) + '</p>' +
    '</div>' +
    '<div class="filters">' +
      '<span class="filter-label">' + esc(d.filtroLabel || 'filtro') + '</span>' +
      btnsHtml +
    '</div>' +
    '<div class="count-bar" id="dir-count">— 0 entradas —</div>' +
    '<div id="dir-list"></div>';

  /* Wire up filter buttons */
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  render();
})();
</script>
</body>
</html>
