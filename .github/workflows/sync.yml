name: sync

on:
  schedule:
    - cron: '0 * * * *'   # todo hora
  push:
    branches: [main]
    paths-ignore:
      - 'dados/**'         # evita loop quando o próprio sync commita
  workflow_dispatch:       # botão manual no GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: instalar dependências
        run: npm ci

      - name: rodar sync
        env:
          DIRECTUS_EMAIL: ${{ secrets.DIRECTUS_EMAIL }}
          DIRECTUS_PASS: ${{ secrets.DIRECTUS_PASS }}
        run: npm run sync

      - name: commitar se houver mudanças
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/livros.js dados/temas-media.js dados/temas-conteudo.js
          git diff --cached --quiet || git commit -m "sync: atualiza dados [skip ci]"
          git push
