name: sync

on:
  schedule:
    - cron: '*/5 * * * *'    # a cada 5 min — publicação automática (o Flow do Directus está com token revogado)
  push:
    branches: [main]
    paths-ignore:
      - 'dados/**'         # evita loop quando o próprio sync commita
  workflow_dispatch:       # botão manual / disparado pelo Directus a cada adição

# se chegarem várias adições em sequência, roda só a mais recente (o sync é idempotente)
concurrency:
  group: sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: rodar sync
        env:
          DIRECTUS_EMAIL: ${{ secrets.DIRECTUS_EMAIL }}
          DIRECTUS_PASS: ${{ secrets.DIRECTUS_PASS }}
        run: npm run sync

      - name: commitar se houver mudanças
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/livros.js dados/temas-media.js dados/temas-conteudo.js dados/db-dirs.js
          git diff --cached --quiet || git commit -m "sync: atualiza dados [skip ci]"
          git pull --rebase origin main
          git push
